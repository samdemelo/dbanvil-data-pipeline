version: 2

models:
  - name: stg_users
    columns:
      - name: user_id
        data_tests:
          - not_null
          - unique

  - name: stg_diagram
    columns:
      - name: diagram_id
        data_tests:
          - not_null
          - unique
      - name: owner_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id

  - name: stg_diagram_table
    columns:
      - name: diagram_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_diagram')
              field: diagram_id
      - name: table_id
        data_tests:
          - not_null

  - name: stg_diagram_index
    columns:
      - name: diagram_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_diagram')
              field: diagram_id
      - name: index_id
        data_tests:
          - not_null
      - name: parent_table_id
        data_tests:
          - not_null

  - name: stg_diagram_column
    data_tests:
    - relationships_compound:
        arguments:
          from_columns: ['diagram_id', 'parent_table_id']
          to_model: ref('stg_diagram_table')
          to_columns: ['diagram_id', 'table_id']
    columns:
      - name: diagram_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_diagram')
              field: diagram_id
      - name: column_id
        data_tests:
          - not_null
      - name: parent_table_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_diagram_table')
              field: table_id