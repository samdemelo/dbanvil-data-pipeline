version: 2

models:
  - name: stg_users
    columns:
      - name: user_id
        data_tests:
          - not_null
          - unique

  - name: stg_diagram
    columns:
      - name: diagram_id
        data_tests:
          - not_null
          - unique
      - name: owner_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id

  - name: stg_diagram_table
    columns:
      - name: diagram_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_diagram')
              field: diagram_id
      - name: table_id
        data_tests:
          - not_null

  - name: stg_diagram_index
    columns:
      - name: diagram_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_diagram')
              field: diagram_id
      - name: index_id
        data_tests:
          - not_null
      - name: parent_table_id
        data_tests:
          - not_null

  - name: stg_diagram_column
    columns:
      - name: diagram_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_diagram')
              field: diagram_id
      - name: column_id
        data_tests:
          - not_null
      - name: parent_table_id
        data_tests:
          - not_null